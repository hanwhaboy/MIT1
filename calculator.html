<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공학용 계산기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #12151f;
      --bg-deep: #0d1018;
      --surface: #1a1f2e;
      --surface-2: #1e2435;
      --display-bg: #0f1218;
      --text: #e4e8f0;
      --text-muted: #6b7a94;
      --text-dim: #4a566a;
      --accent: #3b82f6;
      --op: #d97706;
      --op-hover: #f59e0b;
      --op-text: #fef3c7;
      --eq: #2563eb;
      --eq-hover: #3b82f6;
      --fn: #1e3a5f;
      --fn-hover: #254a77;
      --fn-text: #93c5fd;
      --clear: #5b21b6;
      --clear-hover: #7c3aed;
      --mem: #1e3a4a;
      --mem-hover: #25495e;
      --mem-text: #67e8f9;
      --back-text: #fca5a5;
      --deg-text: #86efac;
      --deg-bg: #14532d;
      --deg-hover: #166534;
      --inv-text: #fbbf24;
      --inv-bg: #451a03;
      --inv-hover: #5c2d0a;
      --key-shadow: 0 2px 0 rgba(0,0,0,0.45);
      --radius: 10px;
      --radius-sm: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Outfit", system-ui, sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #1a2040 0%, var(--bg) 55%, var(--bg-deep) 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }
    .app { width: 100%; max-width: 28rem; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.9rem;
      padding: 0 0.25rem;
    }
    .title {
      margin: 0;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .mode-tabs {
      display: flex;
      background: var(--surface);
      border-radius: 8px;
      padding: 3px;
      gap: 3px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .mode-tab {
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .mode-tab:hover { color: var(--text); }
    .mode-tab.active { background: var(--accent); color: #fff; }

    /* Calculator body */
    .calculator {
      background: var(--surface);
      border-radius: 20px;
      padding: 1.1rem;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
    }

    /* Display */
    .display {
      background: var(--display-bg);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      margin-bottom: 0.9rem;
      min-height: 88px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-end;
      border: 1px solid rgba(255,255,255,0.05);
      gap: 2px;
    }
    .display__expr {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.75rem;
      color: var(--text-dim);
      min-height: 18px;
      text-align: right;
      word-break: break-all;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .display__value {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: clamp(1.6rem, 7vw, 2.1rem);
      font-weight: 700;
      line-height: 1.2;
      word-break: break-all;
      text-align: right;
      color: var(--text);
      transition: color 0.1s;
    }
    .display__value.error { color: #f87171; }

    /* Keys */
    .keys { display: grid; gap: 6px; }
    .keys--sci   { grid-template-columns: repeat(5, 1fr); }
    .keys--basic { grid-template-columns: repeat(4, 1fr); }
    .hidden { display: none; }

    .key {
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius-sm);
      padding: 0.8rem 0.2rem;
      cursor: pointer;
      box-shadow: var(--key-shadow);
      transition: transform 0.07s ease, background 0.1s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1;
    }
    .key:hover  { background: #26304a; }
    .key:active { transform: translateY(1px); box-shadow: none; }
    .key:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .key--fn   { font-size: 0.75rem; font-weight: 600; background: var(--fn);    color: var(--fn-text);  letter-spacing: 0.02em; }
    .key--fn:hover { background: var(--fn-hover); }
    .key--op   { background: var(--op);    color: var(--op-text); font-size: 1.15rem; }
    .key--op:hover { background: var(--op-hover); }
    .key--eq   { background: var(--eq);    color: #fff;           font-size: 1.2rem;  }
    .key--eq:hover { background: var(--eq-hover); }
    .key--clear { background: var(--clear); color: #ede9fe;        font-size: 0.9rem;  }
    .key--clear:hover { background: var(--clear-hover); }
    .key--mem  { background: var(--mem);   color: var(--mem-text); font-size: 0.72rem; font-weight: 700; }
    .key--mem:hover { background: var(--mem-hover); }
    .key--back { background: var(--fn);    color: var(--back-text); font-size: 0.95rem; }
    .key--back:hover { background: var(--fn-hover); }
    .key--deg  { background: var(--deg-bg); color: var(--deg-text); font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; }
    .key--deg:hover { background: var(--deg-hover); }
    .key--deg.rad-mode { background: #1a2a5e; color: #bfdbfe; }
    .key--inv  { background: var(--inv-bg); color: var(--inv-text); font-size: 0.8rem; font-weight: 700; }
    .key--inv:hover { background: var(--inv-hover); }
    .key--inv.active { background: #92400e; color: #fef3c7; box-shadow: 0 0 0 1px var(--inv-text); }
    .key--zero { grid-column: span 2; }
    .key--wide { font-size: 0.9rem; }

    @media (max-width: 380px) {
      .key { font-size: 0.95rem; padding: 0.7rem 0.15rem; }
      .key--fn { font-size: 0.68rem; }
      .key--mem { font-size: 0.65rem; }
      .keys { gap: 5px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">공학용 계산기</h1>
      <div class="mode-tabs" role="tablist">
        <button class="mode-tab active" data-mode="sci">공학용</button>
        <button class="mode-tab"        data-mode="basic">기본</button>
      </div>
    </header>

    <main class="calculator" role="application" aria-label="공학용 계산기">
      <div class="display" aria-live="polite">
        <div class="display__expr" id="expr-line"></div>
        <span class="display__value" id="display">0</span>
      </div>

      <!-- Scientific -->
      <div class="keys keys--sci" id="keys-sci">
        <button class="key key--mem"   data-action="mc">mc</button>
        <button class="key key--mem"   data-action="mplus">m+</button>
        <button class="key key--mem"   data-action="mminus">m−</button>
        <button class="key key--mem"   data-action="mr">mr</button>
        <button class="key key--clear" data-action="clear">AC</button>

        <button class="key key--fn key--deg" id="deg-btn" data-action="deg">DEG</button>
        <button class="key key--fn" data-action="fn" data-value="sin">sin</button>
        <button class="key key--fn" data-action="fn" data-value="cos">cos</button>
        <button class="key key--fn" data-action="fn" data-value="tan">tan</button>
        <button class="key key--op" data-action="operator" data-value="/" data-label="÷">÷</button>

        <button class="key key--fn key--inv" id="inv-btn" data-action="inv">Inv</button>
        <button class="key key--fn" data-action="fn" data-value="sinh">sinh</button>
        <button class="key key--fn" data-action="fn" data-value="cosh">cosh</button>
        <button class="key key--fn" data-action="fn" data-value="tanh">tanh</button>
        <button class="key key--op" data-action="operator" data-value="*" data-label="×">×</button>

        <button class="key key--fn" data-action="fn"       data-value="sq">x²</button>
        <button class="key key--fn" data-action="fn"       data-value="cube">x³</button>
        <button class="key key--fn" data-action="operator" data-value="pow" data-label="xʸ">xʸ</button>
        <button class="key key--fn" data-action="fn"       data-value="10x">10ˣ</button>
        <button class="key key--op" data-action="operator" data-value="-" data-label="−">−</button>

        <button class="key key--fn" data-action="fn"       data-value="sqrt">√x</button>
        <button class="key key--fn" data-action="fn"       data-value="cbrt">∛x</button>
        <button class="key key--fn" data-action="operator" data-value="root" data-label="ʸ√x">ʸ√x</button>
        <button class="key key--fn" data-action="fn"       data-value="ln">ln</button>
        <button class="key key--op" data-action="operator" data-value="+" data-label="+">+</button>

        <button class="key key--fn" data-action="fn"       data-value="inv">1/x</button>
        <button class="key key--fn" data-action="fn"       data-value="fact">x!</button>
        <button class="key key--fn" data-action="operator" data-value="mod" data-label="mod">mod</button>
        <button class="key key--fn" data-action="fn"       data-value="log">log₁₀</button>
        <button class="key key--back" data-action="back">⌫</button>

        <button class="key" data-action="digit" data-value="7">7</button>
        <button class="key" data-action="digit" data-value="8">8</button>
        <button class="key" data-action="digit" data-value="9">9</button>
        <button class="key key--fn" data-action="const" data-value="3.141592653589793">π</button>
        <button class="key key--fn" data-action="fn"    data-value="abs">|x|</button>

        <button class="key" data-action="digit" data-value="4">4</button>
        <button class="key" data-action="digit" data-value="5">5</button>
        <button class="key" data-action="digit" data-value="6">6</button>
        <button class="key key--fn" data-action="const" data-value="2.718281828459045">e</button>
        <button class="key key--fn" data-action="fn"    data-value="neg">±</button>

        <button class="key" data-action="digit" data-value="1">1</button>
        <button class="key" data-action="digit" data-value="2">2</button>
        <button class="key" data-action="digit" data-value="3">3</button>
        <button class="key key--fn" data-action="operator" data-value="EE" data-label="EE">EE</button>
        <button class="key key--fn" data-action="fn"        data-value="pct">%</button>

        <button class="key key--zero" data-action="digit"   data-value="0">0</button>
        <button class="key"           data-action="decimal">.</button>
        <button class="key key--fn"   data-action="fn"      data-value="ex">eˣ</button>
        <button class="key key--eq"   data-action="equals">=</button>
      </div>

      <!-- Basic -->
      <div class="keys keys--basic hidden" id="keys-basic">
        <button class="key key--wide key--clear" data-action="clear">AC</button>
        <button class="key key--fn"  data-action="fn"       data-value="neg">±</button>
        <button class="key key--fn"  data-action="fn"       data-value="pct">%</button>
        <button class="key key--op"  data-action="operator" data-value="/" data-label="÷">÷</button>

        <button class="key" data-action="digit" data-value="7">7</button>
        <button class="key" data-action="digit" data-value="8">8</button>
        <button class="key" data-action="digit" data-value="9">9</button>
        <button class="key key--op" data-action="operator" data-value="*" data-label="×">×</button>

        <button class="key" data-action="digit" data-value="4">4</button>
        <button class="key" data-action="digit" data-value="5">5</button>
        <button class="key" data-action="digit" data-value="6">6</button>
        <button class="key key--op" data-action="operator" data-value="-" data-label="−">−</button>

        <button class="key" data-action="digit" data-value="1">1</button>
        <button class="key" data-action="digit" data-value="2">2</button>
        <button class="key" data-action="digit" data-value="3">3</button>
        <button class="key key--op" data-action="operator" data-value="+" data-label="+">+</button>

        <button class="key key--zero" data-action="digit"   data-value="0">0</button>
        <button class="key"           data-action="decimal">.</button>
        <button class="key key--eq"   data-action="equals">=</button>
      </div>
    </main>
  </div>

  <script>
  (function () {
    const displayEl = document.getElementById("display");
    const exprEl    = document.getElementById("expr-line");
    const degBtn    = document.getElementById("deg-btn");
    const invBtn    = document.getElementById("inv-btn");
    const keysSci   = document.getElementById("keys-sci");
    const keysBasic = document.getElementById("keys-basic");
    const tabs      = document.querySelectorAll(".mode-tab");

    const state = {
      display: "0",
      accumulator: null,
      pendingOp: null,
      shouldReset: false,
      error: false,
      degMode: true,
      invMode: false,
      memory: 0,
      expr: "",
      MAX: 12,
    };

    function fmt(n) {
      if (!Number.isFinite(n)) return "오류";
      if (n === 0) return "0";
      const abs = Math.abs(n);
      if (abs !== 0 && (abs >= 1e12 || (abs < 1e-9 && abs > 0)))
        return n.toExponential(5).replace(/\.?0+e/, "e");
      const s = String(n);
      if (s.includes("e")) return n.toPrecision(7);
      const [i, f] = s.split(".");
      const il = i.replace("-", "").length;
      if (il >= state.MAX) return n.toExponential(4);
      if (f && il + f.length > state.MAX) {
        const mf = Math.max(0, state.MAX - il - 1);
        return Number(n.toFixed(mf)).toString();
      }
      return s;
    }

    function toRad(v) { return state.degMode ? (v * Math.PI) / 180 : v; }
    function toDeg(v) { return state.degMode ? (v * 180) / Math.PI : v; }

    function applyOp(a, b, op) {
      switch (op) {
        case "+": return a + b;
        case "-": return a - b;
        case "*": return a * b;
        case "/": return b === 0 ? NaN : a / b;
        case "pow":  return Math.pow(a, b);
        case "root": return b === 0 ? NaN : Math.pow(a, 1 / b);
        case "EE":   return a * Math.pow(10, b);
        case "mod":  return a % b;
        default: return b;
      }
    }

    const INV_MAP = {
      sin: "asin", cos: "acos", tan: "atan",
      sinh: "asinh", cosh: "acosh", tanh: "atanh",
      sq: "sqrt", cube: "cbrt",
      "10x": "log", ex: "ln",
      ln: "ex", log: "10x",
      sqrt: "sq", cbrt: "cube",
    };

    function applyFn(name, v) {
      if (state.invMode && INV_MAP[name]) name = INV_MAP[name];
      switch (name) {
        case "sin":   return Math.sin(toRad(v));
        case "cos":   return Math.cos(toRad(v));
        case "tan":   return Math.tan(toRad(v));
        case "asin":  return toDeg(Math.asin(v));
        case "acos":  return toDeg(Math.acos(v));
        case "atan":  return toDeg(Math.atan(v));
        case "sinh":  return Math.sinh(v);
        case "cosh":  return Math.cosh(v);
        case "tanh":  return Math.tanh(v);
        case "asinh": return Math.asinh(v);
        case "acosh": return Math.acosh(v);
        case "atanh": return Math.atanh(v);
        case "sq":    return v * v;
        case "cube":  return v * v * v;
        case "sqrt":  return Math.sqrt(v);
        case "cbrt":  return Math.cbrt(v);
        case "ln":    return Math.log(v);
        case "log":   return Math.log10(v);
        case "10x":   return Math.pow(10, v);
        case "ex":    return Math.exp(v);
        case "inv":   return v === 0 ? NaN : 1 / v;
        case "fact":  return factorial(v);
        case "abs":   return Math.abs(v);
        case "neg":   return -v;
        case "pct":   return v / 100;
        default: return v;
      }
    }

    function factorial(n) {
      if (n < 0 || !Number.isInteger(n) || n > 170) return NaN;
      if (n <= 1) return 1;
      let r = 1; for (let i = 2; i <= n; i++) r *= i; return r;
    }

    function setError() {
      state.error = true; state.accumulator = null;
      state.pendingOp = null; state.shouldReset = true; state.expr = "";
      render();
    }

    function render() {
      displayEl.textContent = state.error ? "오류" : state.display;
      displayEl.className = "display__value" + (state.error ? " error" : "");
      exprEl.textContent = state.expr;
    }

    function commitPending(useAcc = false) {
      if (!state.pendingOp || state.accumulator === null) return;
      const cur = useAcc ? state.accumulator : parseFloat(state.display);
      const res = applyOp(state.accumulator, cur, state.pendingOp);
      if (!Number.isFinite(res)) { setError(); return; }
      state.accumulator = res;
      state.display = fmt(res);
    }

    function inputDigit(d) {
      if (state.error) return;
      if (state.shouldReset) { state.display = d === "0" ? "0" : d; state.shouldReset = false; }
      else if (state.display === "0" && d !== "0") state.display = d;
      else if (state.display === "0" && d === "0") return;
      else if (state.display.replace(".", "").replace("-", "").length >= state.MAX) return;
      else state.display += d;
      render();
    }

    function inputDecimal() {
      if (state.error) return;
      if (state.shouldReset) { state.display = "0."; state.shouldReset = false; }
      else if (!state.display.includes(".")) state.display += ".";
      render();
    }

    function inputOperator(op, label) {
      if (state.error) return;
      const cur = parseFloat(state.display);
      if (state.pendingOp && state.accumulator !== null && !state.shouldReset) {
        commitPending(); if (state.error) return;
      } else {
        state.accumulator = cur;
      }
      state.pendingOp = op;
      state.shouldReset = true;
      state.expr = fmt(state.accumulator) + " " + (label || op);
      render();
    }

    function inputFunction(name) {
      if (state.error) return;
      const res = applyFn(name, parseFloat(state.display));
      if (!Number.isFinite(res)) { setError(); return; }
      state.display = fmt(res);
      state.shouldReset = true;
      if (state.invMode) toggleInv();
      render();
    }

    function inputConst(val) {
      if (state.error) return;
      state.display = fmt(val); state.shouldReset = true; render();
    }

    function inputEquals() {
      if (state.error) return;
      if (state.pendingOp && state.accumulator !== null) {
        commitPending(state.shouldReset); if (state.error) return;
        state.display = fmt(state.accumulator);
      }
      state.expr = ""; state.pendingOp = null; state.accumulator = null;
      state.shouldReset = true; render();
    }

    function clearAll() {
      state.display = "0"; state.accumulator = null; state.pendingOp = null;
      state.shouldReset = false; state.error = false; state.expr = "";
      if (state.invMode) toggleInv(); render();
    }

    function backspace() {
      if (state.error || state.shouldReset) return;
      state.display = (state.display.length <= 1 || (state.display.length === 2 && state.display[0] === "-"))
        ? "0" : state.display.slice(0, -1);
      render();
    }

    function toggleDeg() {
      state.degMode = !state.degMode;
      degBtn.textContent = state.degMode ? "DEG" : "RAD";
      degBtn.classList.toggle("rad-mode", !state.degMode);
    }

    function toggleInv() {
      state.invMode = !state.invMode;
      invBtn.classList.toggle("active", state.invMode);
    }

    function setCalcMode(mode) {
      keysSci.classList.toggle("hidden", mode !== "sci");
      keysBasic.classList.toggle("hidden", mode !== "basic");
      tabs.forEach((t) => {
        t.classList.toggle("active", t.dataset.mode === mode);
        t.setAttribute("aria-selected", t.dataset.mode === mode ? "true" : "false");
      });
    }

    function handleClick(e) {
      const btn = e.target.closest("button[data-action]");
      if (!btn) return;
      const { action, value, label } = btn.dataset;
      switch (action) {
        case "digit":    inputDigit(value); break;
        case "decimal":  inputDecimal(); break;
        case "operator": inputOperator(value, label); break;
        case "fn":       inputFunction(value); break;
        case "const":    inputConst(parseFloat(value)); break;
        case "equals":   inputEquals(); break;
        case "clear":    clearAll(); break;
        case "back":     backspace(); break;
        case "deg":      toggleDeg(); break;
        case "inv":      toggleInv(); break;
        case "mc":       state.memory = 0; break;
        case "mplus":    state.memory += parseFloat(state.display); break;
        case "mminus":   state.memory -= parseFloat(state.display); break;
        case "mr":       state.display = fmt(state.memory); state.shouldReset = true; render(); break;
      }
    }

    keysSci.addEventListener("click", handleClick);
    keysBasic.addEventListener("click", handleClick);
    tabs.forEach((t) => t.addEventListener("click", () => setCalcMode(t.dataset.mode)));

    document.addEventListener("keydown", (e) => {
      if (e.target.matches("input, textarea")) return;
      const k = e.key;
      if (k >= "0" && k <= "9") { e.preventDefault(); inputDigit(k); return; }
      if (k === "." || k === ",") { e.preventDefault(); inputDecimal(); return; }
      if (k === "Backspace") { e.preventDefault(); backspace(); return; }
      const map = {
        Enter: inputEquals, "=": inputEquals,
        "+": () => inputOperator("+", "+"),
        "-": () => inputOperator("-", "−"),
        "*": () => inputOperator("*", "×"),
        "/": () => inputOperator("/", "÷"),
        "^": () => inputOperator("pow", "xʸ"),
        "%": () => inputFunction("pct"),
        Escape: clearAll, c: clearAll, C: clearAll,
        s: () => inputFunction("sin"),
        S: () => inputFunction("asin"),
        l: () => inputFunction("log"),
        L: () => inputFunction("ln"),
        r: () => inputFunction("sqrt"),
        p: () => inputConst(Math.PI),
      };
      if (map[k]) { e.preventDefault(); map[k](); }
    });

    render();
  })();
  </script>
</body>
</html>

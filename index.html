<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <button type="button" class="toolbar__btn" aria-label="기록" disabled>
        <svg class="toolbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
        </svg>
      </button>
      <h1 class="toolbar__title">Calculator</h1>
      <button type="button" class="toolbar__btn" aria-label="설정" disabled>
        <svg class="toolbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="3" />
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
        </svg>
      </button>
    </header>

    <section class="display-area" aria-live="polite">
      <p class="display__expr" id="displayExpr"></p>
      <p class="display__value" id="display">0</p>
      <div class="display__badge">
        <span class="display__badge-dot" aria-hidden="true"></span>
        STANDARD MODE
      </div>
    </section>

    <main class="keypad-card" role="application" aria-label="계산기">
      <div class="keys" id="keys">
        <button type="button" class="key key--pink" data-action="clear" aria-label="전체 지우기">AC</button>
        <button type="button" class="key key--soft" data-action="sign" aria-label="부호 바꾸기">±</button>
        <button type="button" class="key key--soft" data-action="percent" aria-label="퍼센트">%</button>
        <button type="button" class="key key--soft" data-action="operator" data-value="/" aria-label="나누기">÷</button>

        <button type="button" class="key key--num" data-action="digit" data-value="7">7</button>
        <button type="button" class="key key--num" data-action="digit" data-value="8">8</button>
        <button type="button" class="key key--num" data-action="digit" data-value="9">9</button>
        <button type="button" class="key key--soft" data-action="operator" data-value="*" aria-label="곱하기">×</button>

        <button type="button" class="key key--num" data-action="digit" data-value="4">4</button>
        <button type="button" class="key key--num" data-action="digit" data-value="5">5</button>
        <button type="button" class="key key--num" data-action="digit" data-value="6">6</button>
        <button type="button" class="key key--soft" data-action="operator" data-value="-" aria-label="빼기">−</button>

        <button type="button" class="key key--num" data-action="digit" data-value="1">1</button>
        <button type="button" class="key key--num" data-action="digit" data-value="2">2</button>
        <button type="button" class="key key--num" data-action="digit" data-value="3">3</button>
        <button type="button" class="key key--soft" data-action="operator" data-value="+" aria-label="더하기">+</button>

        <button type="button" class="key key--num key--zero" data-action="digit" data-value="0">0</button>
        <button type="button" class="key key--num" data-action="decimal" aria-label="소수점">.</button>
        <button type="button" class="key key--equals" data-action="equals" aria-label="계산">=</button>
      </div>
    </main>

    <nav class="bottom-nav" aria-label="하단 메뉴">
      <button type="button" class="bottom-nav__btn bottom-nav__btn--active" aria-label="앱" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
        </svg>
      </button>
      <button type="button" class="bottom-nav__btn" aria-label="기록" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
        </svg>
      </button>
      <button type="button" class="bottom-nav__btn" aria-label="프로필" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </button>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
